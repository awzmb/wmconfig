archs:
  - amd64
  - arm64

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-base
    - ca-certificates
    - gcsfuse
    - atlantis
    - terragrunt
    - opentofu
    - google-cloud-sdk
    - lsb-release-minimal
    - gnupg
    - jq

entrypoint:
  command: /usr/bin/atlantis

accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      shell: /bin/sh
  run-as: nonroot

paths:
  - path: /atlantis-data
    type: directory
    uid: 65532
    permissions: 0o755

environment:
  LANG: en_US.UTF-8
  PATH: /usr/sbin:/sbin:/usr/bin:/bin:/usr/local/bin

cmd: server
