archs:
  - amd64
  - arm64

contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-base
    - java-cacerts
    - openjdk-25-default-jdk
    - glibc-locale-en

entrypoint:
  command: /usr/bin/java

# adds nonroot user
accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      shell: /bin/sh
  run-as: nonroot

environment:
  LANG: en_US.UTF-8
  JAVA_HOME: /usr/lib/jvm/openjdk-25
  PATH: /usr/lib/jvm/openjdk-25/bin:/usr/sbin:/sbin:/usr/bin:/bin

cmd: --version
