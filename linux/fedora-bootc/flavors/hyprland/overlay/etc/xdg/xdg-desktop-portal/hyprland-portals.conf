# Portal backend selection for the Hyprland session. xdg-desktop-portal reads
# <desktop>-portals.conf keyed off XDG_CURRENT_DESKTOP (=Hyprland here), so this
# file — not sway-portals.conf — is what applies. hyprland handles screencast/
# screenshot/global-shortcuts; gtk fills the rest (file chooser, settings, ...).
[preferred]
default=hyprland;gtk
org.freedesktop.impl.portal.Screencast=hyprland
org.freedesktop.impl.portal.Screenshot=hyprland
