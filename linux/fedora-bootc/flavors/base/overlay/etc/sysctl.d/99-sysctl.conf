vm.max_map_count=2147483642

# Prevent I/O starvation under heavy container/flatpak workloads.
# Use absolute byte limits instead of ratio-based defaults, which on
# systems with 16GB+ RAM allow multiple gigabytes of dirty pages to
# accumulate and then flush all at once, saturating the NVMe and
# freezing the desktop.

# Start background writeback at 64 MB of dirty pages (default: 10% of RAM)
vm.dirty_background_bytes=67108864

# Force synchronous writeback at 256 MB of dirty pages (default: 20% of RAM)
vm.dirty_bytes=268435456

# Expire dirty pages after 10s instead of 30s
vm.dirty_expire_centisecs=1000

# Reclaim inode/dentry caches a bit more aggressively (default: 100)
vm.vfs_cache_pressure=150

# Enable realtime audio
vm.swappiness=10
