# Compress the initramfs with zstd (fast to decompress at boot).
compress="zstd"
# Bake ONLY what's needed to find and unlock the root into the initramfs:
#   ostree                 — mount the composefs/ostree deployment root (see below)
#   crypt + systemd-cryptsetup + lvm + dm
#                          — unlock the LUKS-on-LVM root the installer creates
#                            (bib/config.toml autopart --encrypted). This is a
#                            GENERIC (--no-hostonly) initramfs, so LUKS is unlocked
#                            by systemd-cryptsetup-generator from `rd.luks.uuid=` on
#                            the kernel cmdline. That path needs the
#                            `systemd-cryptsetup@.service` template + binary, which
#                            live in the `systemd-cryptsetup` module — `crypt` only
#                            pulls it in reliably in HOSTONLY mode, so we add it
#                            explicitly or the first boot dies with
#                            "systemd-cryptsetup@luks-<uuid>.service not found".
# On a bootc/ostree system the initramfs is shipped in the IMAGE (not generated by
# Anaconda at install), so these modules must be present here; configure.sh
# regenerates the initramfs so this takes effect.
add_dracutmodules+=" ostree crypt systemd-cryptsetup lvm dm "

# CRITICAL for LUKS unlock: force-load the NVMe block driver at initramfs start.
# This is a GENERIC (--no-hostonly) initramfs, which relies on udev coldplug to
# autoload storage drivers from PCI modaliases. On this rawhide that autoload does
# NOT fire for `nvme`, so the root disk never appears: the LUKS device unit
# (dev-disk-by-uuid-<uuid>.device) never activates, systemd-cryptsetup times out
# ("Timed out waiting for device …") and NO passphrase prompt is ever shown — boot
# hangs. `nvme` is present in the initramfs but unloaded; force_drivers loads it
# unconditionally at start (modprobe pulls nvme_core), the disk appears, and the
# stock systemd-cryptsetup-generator path unlocks it normally.
# ponytail: force nvme (covers this all-NVMe fleet). Add ahci/sd_mod/virtio_blk here
# too if this image ever needs to boot SATA/virtio roots.
force_drivers+=" nvme "

# CRITICAL for GPU init: keep `drm` (and therefore the GPU KMS drivers i915/xe/
# amdgpu) and `plymouth` OUT of the initramfs. The plymouth dracut module pulls in
# `drm` + every KMS driver, so i915 would probe INSIDE the initramfs where its
# GuC/HuC firmware (intel-gpu-firmware, only on the real root) is absent. GuC then
# fails to load and never retries after pivot, so the GPU can't do command
# submission — Plymouth's dumb scanout still paints (masking the fault) but the
# console and GDM/mutter black-screen and hang. Omitting drm/plymouth makes the
# kernel use its built-in EFI-GOP/simpledrm framebuffer early and load the real
# GPU drivers AFTER pivot, where their firmware is present. This matches stock
# Fedora and TypicalAM/fedora-bootc (`dracut --omit "drm ... plymouth"`). Trade-
# off: the LUKS passphrase prompt is text-mode in the initramfs; Plymouth still
# runs its graphical splash in userspace after unlock.
omit_dracutmodules+=" drm plymouth "

# Root-filesystem + composefs kernel modules. A GENERIC (--no-hostonly) initramfs
# built at image time has NO disk to probe, so dracut does NOT auto-include the
# root fs driver (that only happens in hostonly mode). Without these the boot gets
# PAST LUKS unlock and then fails "unable to mount root / unknown filesystem":
#   xfs, ext4 — the LVM root LV filesystem (Fedora autopart default is xfs; ext4
#               kept as a cheap fallback in case the default changes)
#   erofs, overlay — bootc mounts its root as composefs (an erofs image overlaid
#               with overlayfs); both are mandatory or the ostree/composefs root
#               can't be assembled.
add_drivers+=" xfs ext4 erofs overlay "

# Deterministic initramfs bytes so bootc/ostree can dedup unchanged layers.
reproducible="yes"

# Ship lsblk so an emergency/rd.break shell is usable (dracut includes blkid but not
# lsblk).
install_items+=" lsblk "
