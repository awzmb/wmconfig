# Compress the initramfs with zstd (fast to decompress at boot).
compress="zstd"
# NOTE: we deliberately do NOT force the GPU drivers (i915/xe/amdgpu) into the
# initramfs. Forcing i915/xe early made the driver probe in the initramfs, where
# the GuC/HuC firmware (intel-gpu-firmware, only on the real root) is absent — so
# GuC failed to load and never retried after pivot, leaving the GPU unable to do
# command submission. Result: Plymouth (dumb scanout) worked but GDM/mutter
# black-screened and hung. Like stock Fedora/Silverblue, let Plymouth use the
# EFI-GOP/simpledrm framebuffer early and load the real GPU drivers AFTER pivot,
# where their firmware (GuC included) is present.
#
# Bake the ostree, Plymouth (boot splash + graphical LUKS prompt) and the
# crypt/lvm/dm modules into the initramfs. On a bootc/ostree system the initramfs
# is shipped in the IMAGE (not generated by Anaconda at install), so the
# LUKS-on-LVM root from bib/config.toml can only be unlocked if these modules are
# present. configure.sh regenerates the initramfs so this takes effect.
#
# `ostree` is CRITICAL and listed explicitly: dracut's default (hostonly)
# detection of the ostree module is unreliable at image-build time, so a forced
# regen can silently drop it — leaving an initramfs that cannot mount the
# composefs/ostree root, i.e. an unbootable system. Every bootc image project
# (Fedora bootc, bluefin/aurora/bazzite via ublue-os) force-adds `ostree` for
# exactly this reason (see bootc-dev/bootc discussion #1084).
add_dracutmodules+=" ostree plymouth crypt lvm dm "
# Deterministic initramfs bytes so bootc/ostree can dedup unchanged layers.
reproducible="yes"
