# Compress the initramfs with zstd (fast to decompress at boot).
compress="zstd"
# Ensure common GPU drivers are in the initramfs for early KMS.
add_drivers+=" i915 amdgpu xe "
# Bake Plymouth (boot splash + graphical LUKS prompt) and the crypt/lvm/dm
# modules into the initramfs. On a bootc/ostree system the initramfs is shipped
# in the IMAGE (not generated by Anaconda at install), so the LUKS-on-LVM root
# from bib/config.toml can only be unlocked if these modules are present.
# configure.sh regenerates the initramfs so this takes effect.
add_dracutmodules+=" plymouth crypt lvm dm "
